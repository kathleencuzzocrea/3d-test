<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>model viewer</title>
    <link href="/3d-test/main.css" rel="stylesheet"> 
</head>
<body>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.0.0/model-viewer.min.js"></script>

    <model-viewer
  src="k_cuzzocrea_earbud.gltf"
  alt="earbud"
  auto-rotate
  camera-controls
  shadow-intensity="1">
</model-viewer>

<model-viewer
  src="bottle.gltf"
  alt="earbud"
  auto-rotate
  camera-controls
  shadow-intensity="1">
</model-viewer>

<model-viewer
  src="strawberry.gltf"
  alt="earbud"
  auto-rotate
  camera-controls
  shadow-intensity="1" id="strawberry">
</model-viewer>

<model-viewer
src="3d-bottle-test.gltf"
auto-rotate
camera-controls
shadow-intensity="0">
</model-viewer>
